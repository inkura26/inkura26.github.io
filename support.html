    <h2>常见问题</h2>
    <h3>如何恢复购买？</h3>
    <p>在 App 内进入“订阅/高级功能”页面，点击“恢复购买”。</p>

    <h3>iCloud 同步不生效怎么办？</h3>
    <p>请确认系统已登录 iCloud，并在 App 内开启 iCloud 同步开关。</p>

    <h3>书源导入失败怎么办？</h3>
    <p>请检查书源 URL 可访问性及 JSON 格式有效性。</p>
